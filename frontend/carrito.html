<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tu carrito de compras en MediApp — Revisa y confirma tus productos.">
    <title>Carrito | MediApp</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="home-body">

<nav class="main-nav">
    <div class="nav-container">
        <div class="nav-left">
            <a href="home.html" class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>MediApp</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="perfil-persona.html" class="nav-avatar-link"><div class="user-avatar"></div></a>
        </div>
    </div>
</nav>

<main class="home-main">

    <div class="section-header">
        <h1>Tu carrito</h1>
        <p>Revisa los medicamentos antes de finalizar la compra</p>
    </div>

    <div class="cart-layout">
        <!-- Items del carrito (dinámico) -->
        <div class="cart-items-container" id="cart-items">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Cargando carrito...</p>
            </div>
        </div>

        <!-- Resumen del carrito -->
        <div class="cart-summary-container">
            <div class="cart-summary-card" id="cart-summary" style="display:none;">
                <!-- Se llena dinámicamente -->
            </div>
            <button class="btn-submit" id="btn-checkout" style="display:none;width:100%;margin-top:16px;">
                Continuar compra
            </button>
        </div>
    </div>

</main>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/carrito.js"></script>
</body>
</html>
