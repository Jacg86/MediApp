<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de MediApp — Encuentra productos de salud a precios reducidos antes de su vencimiento.">
    <title>MediApp - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="home-body">

    <!-- Navbar Principal -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="home.html" class="nav-logo">
                    <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span>MediApp</span>
                </a>
            </div>

            <div class="nav-center">
                <div class="search-bar">
                    <span class="search-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <input type="text" id="search-input" placeholder="Buscar productos o tiendas">
                </div>
            </div>

            <div class="nav-right">
                <a href="pedidos.html" class="icon-btn" title="Mis pedidos">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                </a>
                <a href="carrito.html" class="icon-btn" id="nav-cart-btn" title="Carrito">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </a>
                <a href="perfil-persona.html" class="nav-avatar-link"><div class="user-avatar"></div></a>
            </div>
        </div>
    </nav>

    <main class="home-main">
        
        <!-- Header de sección -->
        <header class="section-header">
            <h1>Ofertas cerca de ti</h1>
            <p>Encuentra productos cerca de su fecha de caducidad a precios reducidos.</p>
        </header>

        <!-- Filtros -->
        <div class="filters-row">
            <select id="filter-categoria" class="filter-select">
                <option value="">Todas las categorías</option>
            </select>
            <select id="filter-ciudad" class="filter-select">
                <option value="">Todas las ciudades</option>
                <option value="Santa Marta">Santa Marta</option>
                <option value="Barranquilla">Barranquilla</option>
                <option value="Bogotá">Bogotá</option>
            </select>
        </div>

        <!-- Grid de Productos (dinámico) -->
        <div class="products-grid" id="products-container">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Cargando productos...</p>
            </div>
        </div>

        <div class="load-more-container">
            <button class="btn-load-more" id="btn-load-more" style="display:none;">Cargar más</button>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
